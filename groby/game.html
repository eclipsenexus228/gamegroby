<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>В Могиле</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        #background {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Чтобы картинка заполняла экран */
        }
        .ui-panel {
            position: absolute;
            top: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid #444;
            pointer-events: none; /* Чтобы клики проходили сквозь текст на картинку */
        }
    </style>
</head>
<body>

    <div id="game-container" onclick="dig()">
        <div class="ui-panel">
            <div id="status">Прогресс: 0%</div>
        </div>
        <img id="background" src="фон.png" alt="Могила">
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        let progress = 0;
        const bg = document.getElementById('background');
        const status = document.getElementById('status');

        function dig() {
            if (progress < 100) {
                progress += 5; // Прибавляем по 5% за клик (можно поменять)
                if (progress > 100) progress = 100;
                
                updateGame();
            }
        }

        function updateGame() {
            status.innerText = `Прогресс: ${progress}%`;

            // Логика смены фонов по твоим названиям
            if (progress >= 100) {
                bg.src = "фон 100%.png";
            } else if (progress >= 60) {
                bg.src = "фон 60%.png";
            } else if (progress >= 40) {
                bg.src = "фон 40%.png";
            } else if (progress >= 20) {
                bg.src = "фон 20%.png";
            } else {
                bg.src = "фон.png";
            }
        }
    </script>
</body>
</html>
